<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Финансовая Пирамида (Симулятор)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>💰 Финансовая Пирамида</h1>

        <div class="stats">
            <p>Баланс: <span id="balance">1000</span>$</p>
            <p>Участников: <span id="users">1</span></p>
            <p>Уровень: <span id="level">1</span></p>
        </div>

        <div class="buttons">
            <button onclick="invest()">Инвестировать</button>
            <button onclick="addUsers()">Привлечь участников</button>
            <button onclick="withdraw()">Вывести деньги</button>
        </div>

        <div class="log">
            <h3>События:</h3>
            <ul id="logList"></ul>
        </div>

        <div class="status" id="status">
            Система стабильна
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
